<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Jogos</title>
    <link rel="stylesheet" href="./portal/styles/home.css" />
  </head>
  <body>
    <main class="wii-shell">
      <section class="screen">
        <header class="screen-head">
          <p class="screen-label">Portal de Jogos</p>
          <p class="screen-subtitle">Cada canal abre um jogo diferente.</p>
        </header>

        <section class="channels-grid">
          <a class="channel-card live palavro" href="./jogos/termo/index.html">
            <div class="channel-banner">
              <span class="palavro-mark" aria-hidden="true">P</span>
            </div>
            <div class="channel-meta">
              <span class="channel-title">PALAVRO</span>
            </div>
          </a>

          <a class="channel-card soon forca" href="./jogos/forca/index.html">
            <div class="channel-banner">
              <strong>FORCA</strong>
            </div>
            <div class="channel-meta">
              <span>Proximo jogo</span>
              <small>Palavras e dicas</small>
            </div>
          </a>

          <a class="channel-card soon memoria" href="./jogos/memoria/index.html">
            <div class="channel-banner">
              <strong>MEMORIA</strong>
            </div>
            <div class="channel-meta">
              <span>Espaco reservado</span>
              <small>Cartas e fases</small>
            </div>
          </a>

          <article class="channel-card empty">
            <div class="channel-empty"></div>
            <div class="channel-meta">
              <span>Novo jogo</span>
              <small>Em breve</small>
            </div>
          </article>

          <article class="channel-card empty">
            <div class="channel-empty"></div>

              <span>Novo jogo</span>

            </div>
          </article>

          <article class="channel-card empty">

              <span>Novo jogo</span>
              <small>Em breve</small>
            </div>
          </article>

          <article class="channel-card empty">
            <div class="channel-empty"></div>
            <div class="channel-meta">
              <span>Novo jogo</span>
              <small>Em breve</small>
            </div>
          </article>

          <article class="channel-card empty">
            <div class="channel-empty"></div>
            <div class="channel-meta">
              <span>Novo jogo</span>
              <small>Em breve</small>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
